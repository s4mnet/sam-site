<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sam Isenstein</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.four-oh-four {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 2rem;
}
.four-oh-four-code {
  font-family: var(--serif); font-style: italic;
  font-size: clamp(4rem, 12vw, 8rem); line-height: 1;
  color: var(--cream); opacity: 0.15; margin-bottom: 1.5rem;
}
.four-oh-four-msg {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(1.4rem, 3vw, 2rem); line-height: 1.3;
  color: var(--cream); margin-bottom: 2.5rem;
}
.four-oh-four-link {
  font-family: var(--sans); font-size: 0.72rem;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold); text-decoration: none; opacity: 0.7;
  transition: opacity 0.3s;
}
.four-oh-four-link:hover { opacity: 1; }
</style>
</head>
<body>
<nav id="nav">
  <a class="nav-wordmark" href="/"><span>Sam Isenstein</span><span class="nav-dash">&mdash;</span><span class="nav-title">Group Creative Director</span></a>
  <div class="nav-links"><a href="/about/">About + Contact</a></div>
</nav>
<div class="four-oh-four">
  <div class="four-oh-four-code">404</div>
  <div class="four-oh-four-msg">Wrong turn.</div>
  <a class="four-oh-four-link" href="/">Back to Work</a>
</div>
</body>
</html>
