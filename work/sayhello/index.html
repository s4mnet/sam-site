  <div class="cs-meta"><span class="cs-meta-item">Apple</span><div class="cs-meta-divider"></div><span class="cs-meta-item">Us — Chris Barrett & Luke Taylor</span><div class="cs-meta-divider"></div><span class="cs-meta-item">Reset</span></div>

<div class="cs-body"><div class="cs-videos">
      <div class="cs-video-block" data-fs-id="707801923">
        <iframe data-src="https://player.vimeo.com/video/707801923?background=1&autoplay=0&loop=1&muted=1&byline=0&title=0&portrait=0&dnt=1" allow="autoplay; fullscreen" allowfullscreen></iframe>
        <div class="cs-video-scrim"></div>
        <div class="cs-play-btn"><svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg></div>
      </div></div></div>

<div class="fs-player" id="fs-player">
  <div class="fs-player-topbar">
    <button class="fs-player-close" id="fs-close">Close &times;</button>
  </div>
  <iframe id="fs-iframe" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>
<script src="https://player.vimeo.com/api/player.js"></script>
<script>

window.addEventListener('scroll', function() {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* FULLSCREEN VIDEO */
var fsPlayer = document.getElementById('fs-player');
var fsIframe = document.getElementById('fs-iframe');
var fsClose = document.getElementById('fs-close');

function openFullscreen(vimeoId) {
  fsIframe.src = 'https://player.vimeo.com/video/' + vimeoId + '?autoplay=1&byline=0&title=0&portrait=0';
  fsPlayer.classList.add('open');
}
function closeFullscreen() {
  fsPlayer.classList.remove('open');
  fsIframe.src = '';
}
fsClose.addEventListener('click', function() { closeFullscreen(); });

/* VIDEO BLOCK INTERACTIONS - mirrors landing page tile pattern */
var isTouch = !window.matchMedia('(hover: hover) and (pointer: fine)').matches;
var blocks = Array.from(document.querySelectorAll('.cs-video-block'));
var csPlayers = new Map();

function initCsPlayer(block) {
  var iframe = block.querySelector('iframe');
  if (!iframe || !iframe.src || csPlayers.has(block)) return;
  try {
    var player = new Vimeo.Player(iframe);
    csPlayers.set(block, player);
    player.ready().then(function() {
      player.getDuration().then(function(d) { player.setCurrentTime(d * 0.3); }).catch(function(){});
    }).catch(function(){});
  } catch(e) {}
}

if (!isTouch) {
  /* Lazy load iframes with IntersectionObserver */
  var csObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var iframe = entry.target;
        if (iframe.dataset.src) { iframe.src = iframe.dataset.src; iframe.removeAttribute('data-src'); }
        csObserver.unobserve(iframe);
      }
    });
  }, { rootMargin: '400px' });
  blocks.forEach(function(block) {
    var iframe = block.querySelector('iframe');
    if (iframe && iframe.dataset.src) csObserver.observe(iframe);
  });

  /* MutationObserver to init player after iframe loads */
  blocks.forEach(function(block) {
    var iframe = block.querySelector('iframe');
    if (!iframe) return;
    var obs = new MutationObserver(function() {
      if (iframe.src && iframe.src !== 'about:blank') {
        setTimeout(function() { initCsPlayer(block); }, 800);
        obs.disconnect();
      }
    });
    obs.observe(iframe, { attributes: true, attributeFilter: ['src'] });

    /* Hover to play with retries */
    block.addEventListener('mouseenter', function() {
      if (!iframe.src && iframe.dataset.src) {
        iframe.src = iframe.dataset.src;
        iframe.removeAttribute('data-src');
        csObserver.unobserve(iframe);
      }
      block.classList.add('is-hovered');
      blocks.forEach(function(b) {
        if (b !== block) { b.classList.add('is-dimmed'); var p = csPlayers.get(b); if (p) p.pause().catch(function(){}); }
      });
      var tryPlay = function(n) {
        var p = csPlayers.get(block);
        if (p) { p.play().catch(function(){}); }
        else if (n > 0) { setTimeout(function() { tryPlay(n - 1); }, 300); }
      };
      tryPlay(8);
    });
    block.addEventListener('mouseleave', function() {
      block.classList.remove('is-hovered');
      var p = csPlayers.get(block); if (p) p.pause().catch(function(){});
      blocks.forEach(function(b) { b.classList.remove('is-dimmed'); });
    });
  });
} else {
  /* Touch: load iframes immediately for static display */
  blocks.forEach(function(block) {
    var iframe = block.querySelector('iframe');
    if (iframe && iframe.dataset.src) { iframe.src = iframe.dataset.src; iframe.removeAttribute('data-src'); }
  });
}
/* Click to fullscreen - all devices */
blocks.forEach(function(block) {
  block.addEventListener('click', function() {
    var id = block.dataset.fsId; if (!id) return;
    openFullscreen(id);
  });
});

/* Escape key */
window.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var fs = document.getElementById('fs-player');
    if (fs && fs.classList.contains('open')) {
      closeFullscreen();
    } else {
      window.location.href = '/';
    }
  }
});
</script>
</body>
