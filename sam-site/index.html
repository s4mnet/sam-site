<script src="https://player.vimeo.com/api/player.js"></script>
<script>
var isTouch = !window.matchMedia('(hover: hover) and (pointer: fine)').matches;

window.addEventListener('scroll', function() {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* LAZY LOAD tile vimeos - desktop only */
if (!isTouch) {
  var grid = document.getElementById('work-grid');
  var tileObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var iframe = entry.target;
        if (iframe.dataset.src) { iframe.src = iframe.dataset.src; iframe.removeAttribute('data-src'); }
        tileObserver.unobserve(iframe);
      }
    });
  }, { rootMargin: '400px' });
  grid.querySelectorAll('iframe[data-src]').forEach(function(iframe) { tileObserver.observe(iframe); });

  /* TILE HOVER */
  var tilePlayers = new Map();
  function initTilePlayer(item) {
    var iframe = item.querySelector('iframe');
    if (!iframe || !iframe.src || tilePlayers.has(item)) return;
    try {
      var player = new Vimeo.Player(iframe);
      tilePlayers.set(item, player);
      player.ready().then(function() {
        player.getDuration().then(function(d) { player.setCurrentTime(d * 0.3); }).catch(function(){});
      }).catch(function(){});
    } catch(e) {}
  }
  grid.querySelectorAll('.work-item').forEach(function(item) {
    var iframe = item.querySelector('.tile-vimeo');
    if (!iframe) return;
    var obs = new MutationObserver(function() {
      if (iframe.src && iframe.src !== 'about:blank') {
        setTimeout(function() { initTilePlayer(item); }, 800);
        obs.disconnect();
      }
    });
    obs.observe(iframe, { attributes: true, attributeFilter: ['src'] });
    item.addEventListener('mouseenter', function() {
      if (!iframe.src && iframe.dataset.src) {
        iframe.src = iframe.dataset.src;
        iframe.removeAttribute('data-src');
        tileObserver.unobserve(iframe);
      }
      var tryPlay = function(n) {
        var p = tilePlayers.get(item);
        if (p) { p.play().catch(function(){}); }
        else if (n > 0) { setTimeout(function() { tryPlay(n-1); }, 300); }
      };
      tryPlay(5);
    });
    item.addEventListener('mouseleave', function() {
      var p = tilePlayers.get(item);
      if (p) p.pause().catch(function(){});
    });
  });
} else {
  /* Touch: hide vimeo iframes, show posters only */
  document.querySelectorAll('.tile-vimeo').forEach(function(el) { el.remove(); });
}
</script>
